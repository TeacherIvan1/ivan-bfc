<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Ivan | BFC Games Prep</title>
    <!-- Importando fuentes impactantes tipo póster deportivo -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            /* Paleta BFC Games (Turquesa oscuro, Naranja brillante, Blanco) */
            --bg-dark: #071a15;
            --bg-gradient: radial-gradient(circle at top right, #0d382b, #05100d);
            --bfc-orange: #ff3b00;
            --bfc-green-glow: #2cb67d;
            --text-main: #ffffff;
            --text-muted: #8da19b;
            --card-bg: rgba(13, 35, 28, 0.6);
            --border-color: rgba(255, 59, 0, 0.3);
            
            --font-title: 'Oswald', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            background-image: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        /* Textura de fondo sutil inspirada en el póster */
        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><path d="M10 10h80v80h-80z" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1"/></svg>');
            background-size: 30px 30px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* HEADER & BRANDING */
        header {
            text-align: center;
            margin-bottom: 10px;
            position: relative;
        }

        .brand-subtitle {
            font-size: 14px;
            letter-spacing: 3px;
            color: var(--bfc-green-glow);
            text-transform: uppercase;
            font-weight: 700;
        }

        .main-title {
            font-family: var(--font-title);
            font-size: 48px;
            color: var(--bfc-orange);
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 59, 0, 0.4);
            margin-top: 5px;
        }

        /* COUNTDOWN SECTION */
        .countdown-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .countdown-wrapper::before {
            content: ">> PERFORMANCE CAP: HIGH_OUTPUT";
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 8px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .countdown-label {
            font-size: 16px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            display: block;
        }

        .countdown-timer {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .time-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .time-value {
            font-family: var(--font-title);
            font-size: 42px;
            color: var(--text-main);
            line-height: 1;
        }

        .time-text {
            font-size: 12px;
            color: var(--bfc-orange);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* INJURY WARNING */
        .injury-banner {
            background: rgba(255, 59, 0, 0.1);
            border-left: 4px solid var(--bfc-orange);
            padding: 10px 15px;
            font-size: 14px;
            color: #ffbba6;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 4px;
        }

        /* TODAY'S WORKOUT SECTION */
        .workout-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .section-header h2 {
            font-family: var(--font-title);
            font-size: 24px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .current-date {
            color: var(--bfc-green-glow);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }

        .session-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 15px;
            border-top: 3px solid var(--bfc-orange);
        }

        .session-title {
            font-family: var(--font-title);
            font-size: 20px;
            color: var(--bfc-orange);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .movement-block {
            margin-bottom: 18px;
            padding-left: 12px;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
        }

        .movement-block:last-child {
            margin-bottom: 0;
        }

        .movement-name {
            font-weight: 700;
            font-size: 17px;
            color: var(--text-main);
            margin-bottom: 4px;
        }

        .movement-desc {
            font-size: 15px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* ESTILOS PARA LA SECCIÓN DE NOTAS */
        .movement-note {
            margin-top: 8px;
            font-size: 13px;
            color: #ffbba6;
            font-style: italic;
            background: rgba(255, 59, 0, 0.08);
            padding: 8px 10px;
            border-left: 2px solid var(--bfc-orange);
            border-radius: 0 4px 4px 0;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            line-height: 1.3;
        }

        .movement-note i {
            margin-top: 2px;
            font-size: 12px;
            color: var(--bfc-orange);
        }

        .loading-state, .error-state {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .error-state { color: var(--bfc-orange); }

        /* Loader Animation */
        .fa-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="container">
        
        <!-- HEADER -->
        <header>
            <div class="brand-subtitle">Teacher Ivan - Lifestyle</div>
            <h1 class="main-title">ADVANCED</h1>
        </header>

        <!-- COUNTDOWN BFC GAMES -->
        <div class="countdown-wrapper">
            <span class="countdown-label">BFC Games 2026 Starts In</span>
            <div class="countdown-timer" id="countdown">
                <div class="time-box"><span class="time-value" id="days">00</span><span class="time-text">Días</span></div>
                <div class="time-box"><span class="time-value" id="hours">00</span><span class="time-text">Hrs</span></div>
                <div class="time-box"><span class="time-value" id="mins">00</span><span class="time-text">Min</span></div>
            </div>
        </div>

        <!-- NOTA DE LESIÓN -->
        <div class="injury-banner">
            <i class="fas fa-triangle-exclamation"></i>
            <span><strong>Protocolo Tendón:</strong> Isométricos obligatorios antes de iniciar sesión. Control en los descensos.</span>
        </div>

        <!-- WOD DEL DÍA -->
        <div class="workout-section">
            <div class="section-header">
                <h2>Programa de Hoy</h2>
                <span class="current-date" id="display-date">CARGANDO...</span>
            </div>

            <!-- Contenedor dinámico donde se inyectarán las sesiones -->
            <div id="workout-container">
                <div class="loading-state">
                    <i class="fas fa-spinner"></i> Obteniendo datos de Google Sheets...
                </div>
            </div>
        </div>

    </div>

    <script>
        // URL DE TU GOOGLE APPS SCRIPT
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzJW7QFzW2BEJOPPgBtNTQZmoLpKheJ9MpDJniCpADrl3vVzVEQHoNmVAEZnvtK3Mm3/exec';

        // 1. LÓGICA DEL COUNTDOWN (Objetivo: 16 Mayo 2026)
        function initCountdown() {
            const targetDate = new Date('May 16, 2026 00:00:00').getTime();

            const updateTimer = setInterval(() => {
                const now = new Date().getTime();
                const distance = targetDate - now;

                if (distance < 0) {
                    clearInterval(updateTimer);
                    document.getElementById('countdown').innerHTML = '<span class="time-value" style="color: var(--bfc-green-glow)">¡IT\'S GAME DAY!</span>';
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

                document.getElementById('days').innerText = days < 10 ? '0' + days : days;
                document.getElementById('hours').innerText = hours < 10 ? '0' + hours : hours;
                document.getElementById('mins').innerText = mins < 10 ? '0' + mins : mins;
            }, 1000);
        }

        // 2. LÓGICA DE EXTRACCIÓN Y RENDERIZADO DEL WOD
        const daysOfWeek = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        const today = new Date();
        const currentDayName = daysOfWeek[today.getDay()];
        
        // Mostrar fecha actual en UI
        const options = { weekday: 'long', month: 'short', day: 'numeric' };
        document.getElementById('display-date').innerText = today.toLocaleDateString('es-ES', options);

        async function fetchWorkout() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('Error en la red');
                
                const data = await response.json();
                renderWorkout(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('workout-container').innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-circle"></i> No se pudo cargar el entrenamiento. Revisa tu conexión o el enlace de Apps Script.
                    </div>`;
            }
        }

        function renderWorkout(rows) {
            const container = document.getElementById('workout-container');
            container.innerHTML = ''; // Limpiar loader

            // Filtrar las filas que corresponden al día actual (ignorando mayúsculas/minúsculas)
            const todayWorkout = rows.filter(row => {
                const sheetDay = row[0] ? String(row[0]).trim().toLowerCase() : '';
                return sheetDay === currentDayName.toLowerCase();
            });

            if (todayWorkout.length === 0) {
                container.innerHTML = `<div class="loading-state">Día de descanso activo o no hay rutina programada para hoy (${currentDayName}).</div>`;
                return;
            }

            // Separar en Mañana y Tarde
            let morningBlocks = [];
            let afternoonBlocks = [];

            todayWorkout.forEach(row => {
                // row: [Día, Sesión, Horario, Bloque, Descripción, Notas]
                const session = row[1] ? String(row[1]).toLowerCase() : '';
                const blockData = {
                    time: row[2] || '',
                    name: row[3] || 'Bloque',
                    desc: row[4] || '',
                    note: row[5] || '' // EXTRACCIÓN DE LA NOTA
                };

                if (session.includes('mañana') || session.includes('morning')) {
                    morningBlocks.push(blockData);
                } else if (session.includes('tarde') || session.includes('afternoon')) {
                    afternoonBlocks.push(blockData);
                }
            });

            // Función auxiliar para generar el HTML de una sesión
            const createSessionHTML = (title, icon, blocks, timeStr) => {
                if (blocks.length === 0) return '';
                
                let blocksHTML = blocks.map(b => {
                    // Si existe una nota, generamos el HTML, si no, se queda vacío
                    const noteHTML = b.note ? `<div class="movement-note"><i class="fas fa-info-circle"></i> ${b.note}</div>` : '';
                    
                    return `
                    <div class="movement-block">
                        <div class="movement-name">${b.name}</div>
                        <div class="movement-desc">${b.desc}</div>
                        ${noteHTML}
                    </div>
                    `;
                }).join('');

                return `
                    <div class="session-card">
                        <div class="session-title"><i class="${icon}"></i> ${title} <span style="font-size:12px; color:var(--text-muted); margin-left:auto; font-family:var(--font-body)">${timeStr}</span></div>
                        ${blocksHTML}
                    </div>
                `;
            };

            // Inyectar en el DOM
            const morningHTML = createSessionHTML('Early Session', 'fas fa-sun', morningBlocks, '05:30 - 06:00');
            const afternoonHTML = createSessionHTML('Performance', 'fas fa-bolt', afternoonBlocks, '14:30 - 16:00');

            container.innerHTML = morningHTML + afternoonHTML;
        }

        // 3. INICIALIZAR APP
        initCountdown();
        fetchWorkout();

    </script>
</body>
</html>
