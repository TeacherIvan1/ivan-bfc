<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Ivan | Lifestyle & Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Nuevo esquema de colores Premium Dark */
            --bg-base: #0f1115;
            --bg-surface: #1a1d24;
            --bg-surface-elevated: #232730;
            --accent-primary: #6366f1; /* Indigo vibrante */
            --accent-secondary: #10b981; /* Esmeralda para confirmaciones/salud */
            --accent-warning: #f59e0b;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255,255,255,0.05);
            
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* HEADER */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .brand-info {
            display: flex;
            flex-direction: column;
        }

        .brand-title {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .brand-subtitle {
            font-size: 12px;
            color: var(--accent-primary);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-primary), #8b5cf6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        /* DAY SELECTOR */
        .day-selector-wrapper {
            position: relative;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 8px;
            /* Ocultar scrollbar */
            scrollbar-width: none; 
        }
        .day-selector-wrapper::-webkit-scrollbar { display: none; }

        .day-selector {
            display: flex;
            gap: 10px;
            min-width: max-content;
        }

        .day-btn {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 10px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .day-btn.active {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }

        /* WORKOUT FEED */
        .workout-feed {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .session-header {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            padding-left: 4px;
        }

        .session-header i {
            color: var(--accent-warning);
        }

        .block-card {
            background: var(--bg-surface);
            border-radius: var(--radius-lg);
            padding: 18px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Etiqueta superior del bloque */
        .block-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
        }

        .block-time {
            color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .block-phase {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Contenido del bloque */
        .block-desc {
            font-size: 16px;
            line-height: 1.5;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* Secciones de detalles profesionales */
        .pro-details {
            background: var(--bg-surface-elevated);
            border-radius: var(--radius-sm);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 4px;
        }

        .detail-row {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            line-height: 1.4;
        }

        .detail-icon {
            color: var(--text-muted);
            margin-top: 2px;
            font-size: 12px;
        }

        .detail-text { color: var(--text-secondary); }
        .detail-label { font-weight: 700; color: var(--text-primary); margin-right: 4px;}

        /* Input de Resultados */
        .result-box {
            margin-top: 6px;
            border-top: 1px dashed var(--border-color);
            padding-top: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-input {
            flex: 1;
            background: var(--bg-base);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 14px;
            outline: none;
        }

        .result-input:focus {
            border-color: var(--accent-primary);
        }

        /* Estados de carga */
        .status-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .status-msg i { font-size: 24px; color: var(--accent-primary); }
        .spin { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="app-header">
            <div class="brand-info">
                <span class="brand-title">Teacher Ivan</span>
                <span class="brand-subtitle">Lifestyle App</span>
            </div>
            <div class="user-avatar">IM</div>
        </header>

        <div class="day-selector-wrapper">
            <div class="day-selector" id="day-selector">
                </div>
        </div>

        <div class="workout-feed" id="workout-feed">
            <div class="status-msg">
                <i class="fas fa-circle-notch spin"></i>
                <span>Sincronizando con base de datos...</span>
            </div>
        </div>

    </div>

    <script>
        // URL DE APPS SCRIPT
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzJW7QFzW2BEJOPPgBtNTQZmoLpKheJ9MpDJniCpADrl3vVzVEQHoNmVAEZnvtK3Mm3/exec';
        
        let globalWorkoutData = [];
        const daysOfWeek = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        let currentSelectedDay = daysOfWeek[new Date().getDay()]; // Día actual por defecto

        // 1. INICIALIZAR LA UI
        function initApp() {
            renderDaySelector();
            fetchWorkoutData();
        }

        // 2. RENDERIZAR SELECTOR DE DÍAS
        function renderDaySelector() {
            const selectorContainer = document.getElementById('day-selector');
            selectorContainer.innerHTML = '';

            // Reordenar para que empiece en Lunes
            const orderedDays = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

            orderedDays.forEach(day => {
                const btn = document.createElement('button');
                btn.className = `day-btn ${day === currentSelectedDay ? 'active' : ''}`;
                btn.innerText = day.substring(0, 3).toUpperCase(); // Mostrar "LUN", "MAR", etc.
                btn.onclick = () => {
                    currentSelectedDay = day;
                    updateActiveDayBtn();
                    renderWorkoutFeed();
                };
                selectorContainer.appendChild(btn);
            });
            
            // Auto-scroll al día seleccionado
            const activeBtn = document.querySelector('.day-btn.active');
            if(activeBtn) {
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }
        }

        function updateActiveDayBtn() {
            document.querySelectorAll('.day-btn').forEach(btn => {
                if (btn.innerText === currentSelectedDay.substring(0, 3).toUpperCase()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 3. OBTENER DATOS
        async function fetchWorkoutData() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('Error de conexión');
                globalWorkoutData = await response.json();
                renderWorkoutFeed();
            } catch (error) {
                console.error(error);
                document.getElementById('workout-feed').innerHTML = `
                    <div class="status-msg" style="color: var(--accent-warning);">
                        <i class="fas fa-exclamation-triangle"></i>
                        <span>No se pudo sincronizar la programación.</span>
                    </div>`;
            }
        }

        // 4. RENDERIZAR EL FEED DE ENTRENAMIENTO
        function renderWorkoutFeed() {
            const feed = document.getElementById('workout-feed');
            feed.innerHTML = ''; // Limpiar

            // Filtrar los datos por el día seleccionado
            const dayData = globalWorkoutData.filter(row => {
                const sheetDay = row[0] ? String(row[0]).trim().toLowerCase() : '';
                return sheetDay === currentSelectedDay.toLowerCase();
            });

            if (dayData.length === 0) {
                feed.innerHTML = `
                    <div class="status-msg">
                        <i class="fas fa-bed" style="color: var(--text-muted);"></i>
                        <span>Día de recuperación o sin programación asignada.</span>
                    </div>`;
                return;
            }

            // Separar sesiones
            const morningBlocks = dayData.filter(r => r[1] && r[1].toLowerCase().includes('mañana'));
            const afternoonBlocks = dayData.filter(r => r[1] && r[1].toLowerCase().includes('tarde'));

            if (morningBlocks.length > 0) feed.appendChild(createSessionDOM('Early Session', 'fas fa-sun', morningBlocks));
            if (afternoonBlocks.length > 0) feed.appendChild(createSessionDOM('Performance Box', 'fas fa-dumbbell', afternoonBlocks));
        }

        // 5. CONSTRUCTOR DE COMPONENTES DOM
        function createSessionDOM(title, iconClass, blocks) {
            const sessionDiv = document.createElement('div');
            
            // Header de la sesión
            const header = document.createElement('div');
            header.className = 'session-header';
            header.innerHTML = `<i class="${iconClass}"></i> ${title}`;
            sessionDiv.appendChild(header);

            // Bloques
            blocks.forEach(row => {
                // Mapeo según el nuevo CSV:
                // 0:Día, 1:Sesión, 2:Horario, 3:Fase, 4:Descripción, 5:Notas_Biomecánicas, 6:Logica, 7:Resultados
                const horario = row[2] || '--:--';
                const fase = row[3] || 'Bloque';
                const descripcion = row[4] || '';
                const notas = row[5] || '';
                const logica = row[6] || '';
                const requiereResultado = row[7] ? row[7].trim() !== '' : false;
                const placeholderResultado = row[7] || 'Anotar resultado...';

                const blockCard = document.createElement('div');
                blockCard.className = 'block-card';

                let proDetailsHTML = '';
                if (notas || logica) {
                    proDetailsHTML = `<div class="pro-details">`;
                    if (notas) {
                        proDetailsHTML += `
                            <div class="detail-row">
                                <i class="fas fa-microscope detail-icon"></i>
                                <div class="detail-text"><span class="detail-label">Biomecánica:</span>${notas}</div>
                            </div>`;
                    }
                    if (logica) {
                        proDetailsHTML += `
                            <div class="detail-row">
                                <i class="fas fa-bullseye detail-icon" style="color: var(--accent-primary);"></i>
                                <div class="detail-text"><span class="detail-label">Objetivo:</span>${logica}</div>
                            </div>`;
                    }
                    proDetailsHTML += `</div>`;
                }

                let resultHTML = '';
                if (requiereResultado) {
                    resultHTML = `
                        <div class="result-box">
                            <i class="fas fa-pen detail-icon"></i>
                            <input type="text" class="result-input" placeholder="${placeholderResultado}">
                        </div>`;
                }

                blockCard.innerHTML = `
                    <div class="block-meta">
                        <div class="block-time"><i class="far fa-clock"></i> ${horario}</div>
                        <div class="block-phase">${fase}</div>
                    </div>
                    <div class="block-desc">${descripcion}</div>
                    ${proDetailsHTML}
                    ${resultHTML}
                `;

                sessionDiv.appendChild(blockCard);
            });

            return sessionDiv;
        }

        // Arrancar la app
        window.onload = initApp;

    </script>
</body>
</html>
