<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Teacher Ivan | Training App</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Paleta UI Moderna (Inspirada en el diseño adjunto) */
            --bg-body: #F0F2F5; /* Fondo claro y limpio */
            --bg-card: #FFFFFF;
            --primary-color: #000000;
            --accent-color: #E2FF31; /* Verde neón vibrante */
            --accent-secondary: #7000FF; /* Púrpura profundo */
            --text-main: #111111;
            --text-muted: #888888;
            --border-light: #EAEAEC;
            
            --radius-pill: 50px;
            --radius-card: 28px;
            --radius-sm: 14px;
            
            --shadow-soft: 0 12px 24px rgba(0, 0, 0, 0.04);
            --shadow-float: 0 20px 40px rgba(112, 0, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .greeting {
            display: flex;
            flex-direction: column;
        }

        .greeting-sub {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .greeting-main {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-color);
            line-height: 1.1;
        }

        .profile-pic {
            width: 52px;
            height: 52px;
            border-radius: 20px;
            background: var(--primary-color);
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 800;
            box-shadow: var(--shadow-soft);
        }

        /* SELECTOR DE DÍAS (Pills flotantes) */
        .calendar-scroller {
            position: relative;
            width: 100%;
            overflow-x: auto;
            padding-bottom: 10px;
            scrollbar-width: none; 
        }
        .calendar-scroller::-webkit-scrollbar { display: none; }

        .days-container {
            display: flex;
            gap: 12px;
            min-width: max-content;
        }

        .day-pill {
            background: var(--bg-card);
            color: var(--text-muted);
            border: 2px solid transparent;
            padding: 12px 20px;
            border-radius: var(--radius-pill);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-soft);
        }

        .day-pill.active {
            background: var(--primary-color);
            color: var(--accent-color);
            border-color: var(--primary-color);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* FEED DE ENTRENAMIENTO */
        .workout-section {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .session-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .session-title {
            font-size: 20px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 4px;
            color: var(--primary-color);
        }

        .session-title i {
            color: var(--accent-secondary);
            font-size: 22px;
        }

        /* TARJETAS DE BLOQUES */
        .task-card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            padding: 24px;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            overflow: hidden;
        }

        /* Pequeño acento decorativo en la tarjeta */
        .task-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--accent-secondary);
            border-radius: 6px 0 0 6px;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-tag {
            background: rgba(112, 0, 255, 0.08);
            color: var(--accent-secondary);
            padding: 6px 14px;
            border-radius: var(--radius-pill);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-time {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .task-content {
            font-size: 17px;
            line-height: 1.6;
            font-weight: 500;
            color: var(--text-main);
        }

        /* Detalles técnicos (Biomecánica/Objetivo) */
        .tech-details {
            background: var(--bg-body);
            border-radius: var(--radius-sm);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .detail-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            font-size: 14px;
            line-height: 1.4;
        }

        .detail-item i {
            color: var(--primary-color);
            margin-top: 3px;
            font-size: 14px;
        }

        .detail-item span { color: var(--text-muted); }
        .detail-item strong { color: var(--text-main); font-weight: 700; }

        /* Input de Resultados */
        .result-container {
            margin-top: 4px;
        }

        .result-input {
            width: 100%;
            background: var(--bg-body);
            border: 2px solid transparent;
            color: var(--primary-color);
            padding: 14px 18px;
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s;
        }

        .result-input::placeholder { color: var(--text-muted); }
        .result-input:focus { border-color: var(--accent-secondary); background: var(--bg-card); }

        /* Estado de carga */
        .loading-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
            gap: 16px;
            color: var(--text-muted);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-light);
            border-top: 4px solid var(--accent-secondary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="app-wrapper">
        
        <header class="top-bar">
            <div class="greeting">
                <span class="greeting-sub">BFC Games 2026</span>
                <span class="greeting-main">Teacher Ivan</span>
            </div>
            <div class="profile-pic">IM</div>
        </header>

        <div class="calendar-scroller">
            <div class="days-container" id="day-selector">
                </div>
        </div>

        <div class="workout-section" id="workout-feed">
            <div class="loading-screen">
                <div class="spinner"></div>
                <span style="font-weight: 500;">Sincronizando WOD...</span>
            </div>
        </div>

    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbzJW7QFzW2BEJOPPgBtNTQZmoLpKheJ9MpDJniCpADrl3vVzVEQHoNmVAEZnvtK3Mm3/exec';
        
        let globalWorkoutData = [];
        const daysOfWeek = ['Domingo', 'Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado'];
        let currentSelectedDay = daysOfWeek[new Date().getDay()];

        function initApp() {
            renderDaySelector();
            fetchWorkoutData();
        }

        function renderDaySelector() {
            const selectorContainer = document.getElementById('day-selector');
            selectorContainer.innerHTML = '';
            const orderedDays = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];

            orderedDays.forEach(day => {
                const btn = document.createElement('button');
                btn.className = `day-pill ${day === currentSelectedDay ? 'active' : ''}`;
                btn.innerText = day; 
                btn.onclick = () => {
                    currentSelectedDay = day;
                    updateActiveDayBtn();
                    renderWorkoutFeed();
                };
                selectorContainer.appendChild(btn);
            });
            
            const activeBtn = document.querySelector('.day-pill.active');
            if(activeBtn) activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }

        function updateActiveDayBtn() {
            document.querySelectorAll('.day-pill').forEach(btn => {
                if (btn.innerText === currentSelectedDay) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        async function fetchWorkoutData() {
            try {
                const response = await fetch(GAS_URL);
                if (!response.ok) throw new Error('Error');
                globalWorkoutData = await response.json();
                renderWorkoutFeed();
            } catch (error) {
                document.getElementById('workout-feed').innerHTML = `
                    <div class="loading-screen" style="color: var(--primary-color);">
                        <i class="fas fa-triangle-exclamation" style="font-size: 30px;"></i>
                        <span>Error al cargar los datos de Sheets.</span>
                    </div>`;
            }
        }

        function renderWorkoutFeed() {
            const feed = document.getElementById('workout-feed');
            feed.innerHTML = ''; 

            const dayData = globalWorkoutData.filter(row => {
                const sheetDay = row[0] ? String(row[0]).trim().toLowerCase() : '';
                return sheetDay === currentSelectedDay.toLowerCase();
            });

            if (dayData.length === 0) {
                feed.innerHTML = `
                    <div class="loading-screen">
                        <i class="fas fa-mug-hot" style="font-size: 32px; color: var(--text-muted);"></i>
                        <span>Día de descanso programado.</span>
                    </div>`;
                return;
            }

            const morningBlocks = dayData.filter(r => r[1] && r[1].toLowerCase().includes('mañana'));
            const afternoonBlocks = dayData.filter(r => r[1] && r[1].toLowerCase().includes('tarde'));

            if (morningBlocks.length > 0) feed.appendChild(createSessionDOM('Morning Flow', 'fas fa-droplet', morningBlocks));
            if (afternoonBlocks.length > 0) feed.appendChild(createSessionDOM('Performance WOD', 'fas fa-bolt', afternoonBlocks));
        }

        function createSessionDOM(title, iconClass, blocks) {
            const sessionGroup = document.createElement('div');
            sessionGroup.className = 'session-group';
            
            const header = document.createElement('div');
            header.className = 'session-title';
            header.innerHTML = `<i class="${iconClass}"></i> ${title}`;
            sessionGroup.appendChild(header);

            blocks.forEach(row => {
                const horario = row[2] || '--:--';
                const fase = row[3] || 'Bloque';
                const descripcion = row[4] || '';
                const notas = row[5] || '';
                const logica = row[6] || '';
                const requiereResultado = row[7] ? row[7].trim() !== '' : false;
                const placeholderResultado = row[7] || 'Escribe tu resultado...';

                const card = document.createElement('div');
                card.className = 'task-card';

                let detailsHTML = '';
                if (notas || logica) {
                    detailsHTML = `<div class="tech-details">`;
                    if (notas) {
                        detailsHTML += `
                            <div class="detail-item">
                                <i class="fas fa-layer-group"></i>
                                <span><strong>Ejecución:</strong> ${notas}</span>
                            </div>`;
                    }
                    if (logica) {
                        detailsHTML += `
                            <div class="detail-item">
                                <i class="fas fa-crosshairs"></i>
                                <span><strong>Foco:</strong> ${logica}</span>
                            </div>`;
                    }
                    detailsHTML += `</div>`;
                }

                let resultHTML = '';
                if (requiereResultado) {
                    resultHTML = `
                        <div class="result-container">
                            <input type="text" class="result-input" placeholder="${placeholderResultado}">
                        </div>`;
                }

                card.innerHTML = `
                    <div class="task-header">
                        <span class="task-tag">${fase}</span>
                        <div class="task-time"><i class="far fa-clock"></i> ${horario}</div>
                    </div>
                    <div class="task-content">${descripcion}</div>
                    ${detailsHTML}
                    ${resultHTML}
                `;

                sessionGroup.appendChild(card);
            });

            return sessionGroup;
        }

        window.onload = initApp;

    </script>
</body>
</html>
